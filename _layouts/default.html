<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}" data-theme="light">
{%- assign d = site.data.site -%}
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{{ d.name }}{% if d.role %} — {{ d.role }}{% endif %}</title>
  <meta name="description" content="{{ d.tagline }}">

  <meta property="og:title" content="{{ d.name }}">
  <meta property="og:description" content="{{ d.tagline }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">

  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>

<body>

  <!-- Four gradient layers; site.js cross-fades between them per section. -->
  <div class="bg" aria-hidden="true">
    <div class="bg-layer bg-hero is-on" data-layer="hero"></div>
    <div class="bg-layer bg-about"      data-layer="about"></div>
    <div class="bg-layer bg-edu"        data-layer="edu"></div>
    <div class="bg-layer bg-proj"       data-layer="proj"></div>
  </div>

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
    <svg class="moon" width="19" height="19" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
    <svg class="sun" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2M12 19.5v2M2.5 12h2M19.5 12h2M5.2 5.2l1.4 1.4M17.4 17.4l1.4 1.4M18.8 5.2l-1.4 1.4M6.6 17.4l-1.4 1.4"/></svg>
  </button>

  <!-- The rail. Its contents are cloned from the profile card at load. -->
  <aside class="rail" id="rail">
    <p class="rail-name">{{ d.name }}</p>
    <div id="railSlot"></div>
  </aside>

  <main>
    {{ content }}

    <footer class="footer">
      {%- if d.social.email %}<a href="mailto:{{ d.social.email }}">{{ d.social.email }}</a>{% endif %}
      {%- if d.social.github %}<a href="{{ d.social.github }}">GitHub</a>{% endif %}
      {%- if d.social.linkedin %}<a href="{{ d.social.linkedin }}">LinkedIn</a>{% endif %}
    </footer>
  </main>

  <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
</body>
</html>
